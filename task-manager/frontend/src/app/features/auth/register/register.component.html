<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="material-icons logo-icon">check_circle</span>
      <span class="logo-text">TaskFlow</span>
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Start organizing your tasks in seconds.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <mat-form-field appearance="outline" class="field">
        <mat-label>Full name</mat-label>
        <input matInput formControlName="name" type="text" autocomplete="name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Password</mat-label>
        <input
          matInput
          formControlName="password"
          type="password"
          autocomplete="new-password"
        />
      </mat-form-field>

      <button class="btn-submit" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creating account…' : 'Create account' }}
      </button>

      <p class="helper">
        Already have an account?
        <a class="helper-link" routerLink="/login">Sign in</a>
      </p>
    </form>
  </div>
</div>
