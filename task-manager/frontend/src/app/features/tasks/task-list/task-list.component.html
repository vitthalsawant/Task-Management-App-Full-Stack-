<div class="header">
  <div>
    <h2 class="title">Your tasks</h2>
    <p class="subtitle">Track work, filter by status, and search instantly.</p>
  </div>

  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Add task
  </button>
</div>

<div class="controls">
  <mat-button-toggle-group
    [value]="status()"
    (valueChange)="setStatus($event)"
    aria-label="Task status filter"
  >
    <mat-button-toggle value="">All</mat-button-toggle>
    <mat-button-toggle value="Todo">Todo</mat-button-toggle>
    <mat-button-toggle value="In Progress">In Progress</mat-button-toggle>
    <mat-button-toggle value="Done">Done</mat-button-toggle>
  </mat-button-toggle-group>

  <mat-form-field appearance="outline" class="search">
    <mat-label>Search</mat-label>
    <input matInput [formControl]="searchControl" placeholder="Title or description" />
    <mat-icon matIconSuffix>search</mat-icon>
  </mat-form-field>
</div>

@if (loading()) {
  <app-loading-spinner />
} @else {
  @if ((data()?.items?.length ?? 0) === 0) {
    <div class="empty">
      <mat-icon class="empty-icon">inbox</mat-icon>
      <div class="empty-title">No tasks yet</div>
      <div class="empty-sub">Create your first task to get started.</div>
      <button mat-stroked-button color="primary" (click)="openCreate()">Create task</button>
    </div>
  } @else {
    <div class="grid">
      @for (t of data()!.items; track t._id) {
        <app-task-card [task]="t" (edit)="openEdit($event)" (remove)="delete($event)" />
      }
    </div>
  }
}
