<div class="page-header">
  <div class="page-title-group">
    <h1 class="page-title">My Tasks</h1>
    <p class="page-subtitle">Track work, filter by status, and search instantly.</p>
  </div>

  <button class="btn-primary" (click)="openCreate()">
    <span class="material-icons btn-icon">add</span>
    New Task
  </button>
</div>

<div class="controls">
  <div class="filter-tabs">
    @for (f of filters; track f.value) {
      <button
        class="filter-tab"
        [class.active]="status() === f.value"
        (click)="setStatus(f.value)"
      >
        {{ f.label }}
      </button>
    }
  </div>

  <div class="search-wrap">
    <span class="material-icons search-icon">search</span>
    <input
      class="search-input"
      type="text"
      placeholder="Search tasks…"
      [formControl]="searchControl"
    />
  </div>
</div>

@if (loading()) {
  <app-loading-spinner />
} @else {
  @if ((data()?.items?.length ?? 0) === 0) {
    <div class="empty-state">
      <div class="empty-icon-wrap">
        <span class="material-icons empty-icon">inbox</span>
      </div>
      <h3 class="empty-title">No tasks here</h3>
      <p class="empty-sub">Create your first task to get started.</p>
      <button class="btn-outline" (click)="openCreate()">
        <span class="material-icons btn-icon">add</span>
        Create task
      </button>
    </div>
  } @else {
    <div class="task-grid">
      @for (t of data()!.items; track t._id) {
        <app-task-card [task]="t" (edit)="openEdit($event)" (remove)="delete($event)" />
      }
    </div>
  }
}
