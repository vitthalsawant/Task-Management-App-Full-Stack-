<mat-card class="card">
  <mat-card-header>
    <mat-card-title>{{ task.title }}</mat-card-title>
    <mat-card-subtitle>
      <mat-chip-set>
        <mat-chip [color]="task.status | statusColor" [highlighted]="true">
          {{ task.status }}
        </mat-chip>
        @if (task.dueDate) {
          <mat-chip>
            <mat-icon inline>event</mat-icon>
            Due {{ task.dueDate | date: 'mediumDate' }}
          </mat-chip>
        }
      </mat-chip-set>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p class="desc">{{ task.description || '—' }}</p>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button (click)="edit.emit(task)">
      <mat-icon>edit</mat-icon>
      Edit
    </button>
    <button mat-button color="warn" (click)="remove.emit(task)">
      <mat-icon>delete</mat-icon>
      Delete
    </button>
  </mat-card-actions>
</mat-card>
