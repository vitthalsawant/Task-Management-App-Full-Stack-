<div class="task-card">
  <div class="card-header">
    <span class="badge {{ task.status | statusColor }}">{{ task.status }}</span>

    @if (task.dueDate) {
      <span class="due-date">
        <mat-icon class="due-icon">event</mat-icon>
        {{ task.dueDate | date: 'MMM d, y' }}
      </span>
    }
  </div>

  <h3 class="card-title">{{ task.title }}</h3>

  <p class="card-desc">{{ task.description || 'No description provided.' }}</p>

  <div class="card-footer">
    <button class="card-btn card-btn--edit" (click)="edit.emit(task)">
      <mat-icon class="card-btn-icon">edit</mat-icon>
      Edit
    </button>
    <button class="card-btn card-btn--delete" (click)="remove.emit(task)">
      <mat-icon class="card-btn-icon">delete_outline</mat-icon>
      Delete
    </button>
  </div>
</div>
